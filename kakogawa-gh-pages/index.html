<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加古川市 道路取り締まり情報ポータル</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .top-logo { width: 130px; height: 130px; object-fit: contain; filter: drop-shadow(0 4px 14px rgba(3,169,244,0.25)); }
  .logo-area { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.4rem; font-weight: bold; color: #444; margin-bottom: 5px; }
  .main-title { font-size: 2.2rem; font-weight: bold; text-align: center; color: #333; margin-bottom: 25px; margin-top: 0; letter-spacing: 0.05em; line-height: 1.3; }
  .desc { width: 100%; max-width: 460px; font-size: 1.1rem; line-height: 1.7; color: #555; text-align: center; margin-bottom: 40px; }
  .btn-wrap { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 24px; }
  @media (max-width: 576px) {
    .top-logo { width: 100px; height: 100px; }
    .main-title { font-size: 1.5rem; margin-bottom: 15px; }
    .desc { font-size: 0.95rem; margin-bottom: 25px; }
    .btn-wrap { gap: 16px; }
    .btn-blue, .btn-orange { font-size: 1.15rem; padding: 1rem 0; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div style="text-align:center;">
    <img src="img/logo.png" class="top-logo" alt="ポータルロゴ">
  </div>
  <div class="outer-box">
    <div class="inner-card" style="align-items:center; display:flex; flex-direction:column;">
      <div class="logo-area">🚨 加古川市</div>
      <h1 class="main-title">道路取り締まり共有ポータル</h1>
      <div class="desc">
        市内の安全運転向上と取り締まり情報の共有のためのウェブサイトです。以下から目的の画面を選択してください。
      </div>
      <div class="btn-wrap">
        <a href="user/post.html" class="btn-blue">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          <span>取り締まり情報を投稿する</span>
        </a>
        <a href="user/calendar.html" class="btn-orange">
          <svg class="btn-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <span>最新情報を見る</span>
        </a>
      </div>
    </div>
  </div>
  <div class="admin-link-container">
    <a href="#" onclick="alert('管理者ページはサーバー動作時のみ利用可能です。'); return false;">
      <span>🛡️</span><span>管理者用ページ</span>
    </a>
  </div>
</div>
</body>
</html>
